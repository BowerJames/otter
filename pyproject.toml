[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
    "mypy>=1.17",
]

# ---------------------------------------------------------------------------
# Ruff: formatting + linting
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["otter_ai", "otter_ai_chat_completions"]

# ---------------------------------------------------------------------------
# Mypy: type checking
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true
files = ["packages"]
mypy_path = ["packages/otter_ai/src", "packages/otter_ai_chat_completions/src"]
explicit_package_bases = true
plugins = ["pydantic.mypy"]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages"]
