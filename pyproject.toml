[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "ruff>=0.11",
    "mypy>=1.17",
]

# ---------------------------------------------------------------------------
# Ruff: formatting + linting
# ---------------------------------------------------------------------------
[tool.ruff]
target-version = "py312"
line-length = 88
extend-exclude = [".venv", "build", "dist", "packages/otter_ai_assistant_provider_stream/src/otter_ai_assistant_provider_stream/_catalog_generated.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.isort]
known-first-party = ["otter_ai_core", "otter_ai_chat_completions", "otter_ai_assistant_provider_stream", "otter_ai_realtime", "otter_ai_assistant_stream_model_connection"]

# ---------------------------------------------------------------------------
# Mypy: type checking
# ---------------------------------------------------------------------------
[tool.mypy]
python_version = "3.12"
strict = true
files = ["packages"]
mypy_path = ["packages/otter_ai_core/src", "packages/otter_ai_chat_completions/src", "packages/otter_ai_chat_completions/tests", "packages/otter_ai_assistant_provider_stream/src", "packages/otter_ai_assistant_provider_stream/tests", "packages/otter_ai_realtime/src", "packages/otter_ai_realtime/tests", "packages/otter_ai_assistant_stream_model_connection/src", "packages/otter_ai_assistant_stream_model_connection/tests"]
explicit_package_bases = true
plugins = ["pydantic.mypy"]

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["packages"]
