[project]
name = "otter-ai-assistant-stream-model-connection"
dynamic = ["version"]
description = "Pure-local adapter that wraps an AssistantMessageStreamFn as a fully-functional, request-driven ModelConnectionFn (a ModelConnectionFnBuilder[AssistantMessageStreamFn]) for otter-ai-core"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "otter-ai-core",
]

[tool.uv.sources]
otter-ai-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/otter_ai_assistant_stream_model_connection"]

# Version is derived from src/otter_ai_assistant_stream_model_connection/__init__.py
# (single source of truth).
[tool.hatch.version]
path = "src/otter_ai_assistant_stream_model_connection/__init__.py"
