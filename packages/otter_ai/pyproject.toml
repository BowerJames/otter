[project]
name = "otter-ai"
dynamic = ["version"]
description = "Otter AI package"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/otter_ai"]

# Version is derived from src/otter_ai/__init__.py (single source of truth).
[tool.hatch.version]
path = "src/otter_ai/__init__.py"
