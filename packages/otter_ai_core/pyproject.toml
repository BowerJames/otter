[project]
name = "otter-ai-core"
dynamic = ["version"]
description = "Otter AI core package: LLM context data model + generic stream runtime — the driving types/models for otter-ai-chat-completions and otter-ai-assistant-provider-stream"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/otter_ai_core"]

# Version is derived from src/otter_ai_core/__init__.py (single source of truth).
[tool.hatch.version]
path = "src/otter_ai_core/__init__.py"
