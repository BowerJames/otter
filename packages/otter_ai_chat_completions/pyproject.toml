[project]
name = "otter-ai-chat-completions"
dynamic = ["version"]
description = "Chat Completions wire-format contract package for otter-ai"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "httpx>=0.27",
    "otter-ai",
]

[tool.uv.sources]
otter-ai = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/otter_ai_chat_completions"]

# Version is derived from src/otter_ai_chat_completions/__init__.py (single source of truth).
[tool.hatch.version]
path = "src/otter_ai_chat_completions/__init__.py"
