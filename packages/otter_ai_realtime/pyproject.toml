[project]
name = "otter-ai-realtime"
dynamic = ["version"]
description = "Realtime wire-format contract package for otter-ai-core: a concrete ModelConnectionFn[RealtimeModelOptions] for OpenAI-Realtime-format APIs"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "websockets>=13",
    "otter-ai-core",
]

[tool.uv.sources]
otter-ai-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/otter_ai_realtime"]

# Version is derived from src/otter_ai_realtime/__init__.py (single source of truth).
[tool.hatch.version]
path = "src/otter_ai_realtime/__init__.py"
