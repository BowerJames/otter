[project]
name = "otter-ai-assistant-provider-stream"
dynamic = ["version"]
description = "Provider/dispatch layer for otter-ai-core: built-in model catalogs (chat-completions + realtime), env-key resolution, thinking-level clamping, and the create_model_connection_by_provider seam — a ModelConnectionFnBuilder[ProviderModelOption] routing on KnownApis"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2",
    "otter-ai-core",
    "otter-ai-chat-completions",
    "otter-ai-assistant-stream-model-connection",
    "otter-ai-realtime",
]

[tool.uv.sources]
otter-ai-core = { workspace = true }
otter-ai-chat-completions = { workspace = true }
otter-ai-assistant-stream-model-connection = { workspace = true }
otter-ai-realtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/otter_ai_assistant_provider_stream"]

# Version is derived from src/otter_ai_assistant_provider_stream/__init__.py (single source of truth).
[tool.hatch.version]
path = "src/otter_ai_assistant_provider_stream/__init__.py"
